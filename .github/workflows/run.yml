name: IG Scraper MEGA VFX Setup

on:
  workflow_dispatch:

jobs:
  mega_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- STEP 1: LATEST RCLONE INSTALLATION ---
      - name: Install Latest Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      # --- STEP 2: CREATE REMOTE & TEST CONNECTION ---
      - name: Rclone MEGA Setup & Test
        env:
          MEGA_USER: ${{ secrets.MEGA_USER }}
          MEGA_PASS: ${{ secrets.MEGA_PASS }}
        run: |
          echo "🛠️ Creating Rclone remote 'vfx'..."
          # VFX naam ka remote banaya ja raha hai
          rclone config create vfx mega user "$MEGA_USER" pass "$MEGA_PASS"
          
          echo "🔍 Connection test kar raha hoon..."
          rclone about vfx:
          echo "✅ MEGA Connection Successful!"

      # --- STEP 3: RUN SCRAPER ---
      - name: Install Scraper Dependencies
        run: npm install axios

      - name: Run Scraper V1
        run: node scraper-v1.js

      # --- STEP 4: UPLOAD DATA TO MEGA ---
      - name: Upload to MEGA
        if: success()
        run: |
          # Naya folder name date aur time ke sath
          BATCH_NAME="IG_Scrape_$(date +'%Y-%m-%d_%H-%M')"
          
          echo "🚀 Uploading data to MEGA in folder: $BATCH_NAME"
          
          # Root directory se sirf JSON files utha kar vfx remote par upload karna
          rclone copy . vfx:/$BATCH_NAME \
            --include "IG_RawData_Full_NodeJS_*.json" \
            -P --transfers 32 --checkers 64

      # --- STEP 5: EMERGENCY BACKUP (GitHub Artifacts) ---
      - name: Backup if MEGA Fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-backup
          path: IG_RawData_Full_NodeJS_*.json
          retention-days: 1
