name: IG Scraper Runner

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Scraper
        run: node scraper-v1.js  # <--- Ye sahi naam hona chahiye

      - name: Upload Scraped Data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraped-results
          path: IG_RawData_Full_NodeJS_*.json # <--- Nayi file ka pattern
          retention-days: 5
