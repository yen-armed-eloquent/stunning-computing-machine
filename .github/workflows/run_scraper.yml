name: IG Scraper V1 Runner

on:
  workflow_dispatch: 

jobs:
  scrape_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Scraper V1
        # Ensure karein ke file ka naam GitHub par 'scraper-v1.js' hi hai
        run: node scraper-v1.js

      - name: Upload Scraped JSON
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: instagram-raw-data
          # scraper-v1.js ye wala file pattern banata hai:
          path: IG_RawData_Full_NodeJS_*.json
          retention-days: 5
