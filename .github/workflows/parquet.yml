name: IG Enterprise Real-time Pipeline

on:
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache hata diya hai taake lock file ka error na aaye

      - name: Debug File Listing
        run: ls -R # Yeh check karega ke files kahan hain

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "❌ package.json nahi mili! Manually install kar raha hoon..."
            npm install axios parquetjs-lite
          fi

      - name: Install Latest Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure MEGA (VFX Remote)
        env:
          MEGA_USER: ${{ secrets.MEGA_USER }}
          MEGA_PASS: ${{ secrets.MEGA_PASS }}
        run: |
          if [ -z "$MEGA_USER" ]; then
            echo "❌ MEGA_USER secret missing hai!"
            exit 1
          fi
          rclone config create vfx mega user "$MEGA_USER" pass "$MEGA_PASS"
          rclone about vfx:

      - name: Verify Input Files
        run: |
          if [ ! -f links.txt ]; then
            echo "❌ links.txt nahi mili! Empty file bana raha hoon test ke liye..."
            echo "https://www.instagram.com/p/C4iO_46tXyq/" > links.txt
          fi

      - name: Run Scraper
        run: node scraper-v1.js

      - name: Final Artifact Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-results
          path: |
            ig_master_data.parquet
            scraping_report.txt
